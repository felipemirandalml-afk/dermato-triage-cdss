version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend-v2/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./frontend-v2/src:/app/src
    environment:
      - NODE_ENV=production
    restart: always

networks:
  default:
    name: dermato-triage-network
